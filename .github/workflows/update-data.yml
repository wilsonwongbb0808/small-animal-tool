name: Update data

on:
  schedule:
    # 21:45 Asia/Shanghai = 13:45 UTC
    - cron: "45 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update latest draw data
        run: node scripts/update-latest.mjs

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/latest-review.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update draw data"
            git push
          fi
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>六合彩本地蒙特卡洛预测工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Local Monte Carlo Analytics</p>
        <h1>六合彩本地蒙特卡洛预测工具</h1>
        <p class="subhead">读取本地历史开奖数据库，每次点击预测都会重新运行蒙特卡洛模拟。</p>
      </div>
      <div class="status-panel">
        <span id="connectionStatus" class="status-dot"></span>
        <span id="statusText">等待加载</span>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="预测控制">
        <label>
          模拟次数
          <input id="simulationInput" type="number" min="1000" max="200000" step="1000" value="50000" />
        </label>
        <button id="loadBtn" type="button">读取本地数据库</button>
        <button id="updateBtn" type="button">立即更新开奖</button>
        <button id="predictBtn" type="button">开始预测</button>
      </section>

      <section class="notice">
        <strong>提示：</strong>彩票开奖具有随机性，蒙特卡洛模拟只能给出历史数据下的概率参考，不保证命中。
      </section>

      <section class="summary-grid">
        <article class="metric">
          <span>本地记录</span>
          <strong id="drawCount">-</strong>
        </article>
        <article class="metric">
          <span>最新期号</span>
          <strong id="latestExpect">-</strong>
        </article>
        <article class="metric">
          <span>最新特码</span>
          <strong id="latestSpecial">-</strong>
        </article>
        <article class="metric">
          <span>模拟次数</span>
          <strong id="simulationCount">-</strong>
        </article>
        <article class="metric">
          <span>最后更新</span>
          <strong id="lastUpdatedAt">-</strong>
        </article>
      </section>

      <section class="main-column">
        <section class="panel">
          <div class="panel-title">
            <h2>模拟后结果</h2>
            <span id="predictionTime">等待预测</span>
          </div>
          <div id="simulationResult" class="summary-picks"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>特码推荐</h2>
            <span>每次至少推荐 10 个特码</span>
          </div>
          <div id="specialRecommendations" class="special-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>生肖推荐</h2>
            <span>推荐 5 组：每组一个生肖 + 一个对应平码</span>
          </div>
          <div id="zodiacRecommendations" class="zodiac-picks"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>开奖复盘</h2>
            <span id="reviewTime">等待更新开奖后生成</span>
          </div>
          <div id="reviewPanel" class="review-panel"></div>
        </section>

        <section class="panel history-panel">
          <div class="panel-title">
            <h2>历史开奖</h2>
            <span>显示最近 20 期，最后一位为特码</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>期号</th>
                  <th>日期</th>
                  <th>开奖号码</th>
                  <th>特码属性</th>
                </tr>
              </thead>
              <tbody id="recentRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
